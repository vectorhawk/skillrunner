name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  MACOSX_DEPLOYMENT_TARGET: "13.0"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: macos-14  # Apple Silicon runner
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch_label: arm64
          - target: x86_64-apple-darwin
            arch_label: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p skillrunner-cli

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/skillrunner dist/skillrunner
          cd dist
          tar czf skillrunner-${{ matrix.target }}.tar.gz skillrunner
          shasum -a 256 skillrunner-${{ matrix.target }}.tar.gz > skillrunner-${{ matrix.target }}.tar.gz.sha256

      # Uncomment when code signing is set up:
      # - name: Sign binary
      #   env:
      #     APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      #     APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #   run: |
      #     # Import certificate
      #     echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
      #     security create-keychain -p "" build.keychain
      #     security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      #     security list-keychains -d user -s build.keychain
      #     # Sign
      #     codesign --sign "Developer ID Application: SkillClub Inc" --options runtime dist/skillrunner

      # Uncomment when notarization is set up:
      # - name: Notarize binary
      #   env:
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #     APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      #   run: |
      #     cd dist
      #     zip skillrunner.zip skillrunner
      #     xcrun notarytool submit skillrunner.zip \
      #       --apple-id "$APPLE_ID" \
      #       --team-id "$APPLE_TEAM_ID" \
      #       --password "$APPLE_APP_PASSWORD" \
      #       --wait

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skillrunner-${{ matrix.target }}
          path: |
            dist/skillrunner-${{ matrix.target }}.tar.gz
            dist/skillrunner-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/skillrunner-aarch64-apple-darwin/*
            artifacts/skillrunner-x86_64-apple-darwin/*

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: skillclub/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARM64_SHA=$(cat artifacts/skillrunner-aarch64-apple-darwin/skillrunner-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          X86_SHA=$(cat artifacts/skillrunner-x86_64-apple-darwin/skillrunner-x86_64-apple-darwin.tar.gz.sha256 | awk '{print $1}')

          cat > homebrew-tap/Formula/skillrunner.rb << FORMULA
          class Skillrunner < Formula
            desc "Secure local runtime for AI skills — the SkillClub platform CLI"
            homepage "https://skillclub.ai"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/skillclub/skillrunner/releases/download/v${VERSION}/skillrunner-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM64_SHA}"
              else
                url "https://github.com/skillclub/skillrunner/releases/download/v${VERSION}/skillrunner-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_SHA}"
              end
            end

            def install
              bin.install "skillrunner"
            end

            test do
              assert_match "skillrunner", shell_output("#{bin}/skillrunner --version")
            end
          end
          FORMULA

      - name: Commit and push formula
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${GITHUB_REF_NAME#v}"
          git add Formula/skillrunner.rb
          git commit -m "Update skillrunner to ${VERSION}"
          git push
