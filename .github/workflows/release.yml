name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  MACOSX_DEPLOYMENT_TARGET: "13.0"

jobs:
  build-macos:
    name: Build ${{ matrix.target }}
    runs-on: macos-14
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p skillrunner-cli

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/skillrunner dist/skillrunner
          cd dist
          tar czf skillrunner-${{ matrix.target }}.tar.gz skillrunner
          shasum -a 256 skillrunner-${{ matrix.target }}.tar.gz > skillrunner-${{ matrix.target }}.tar.gz.sha256

      # Uncomment when code signing is set up:
      # - name: Sign binary
      #   env:
      #     APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      #     APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #   run: |
      #     echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
      #     security create-keychain -p "" build.keychain
      #     security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      #     security list-keychains -d user -s build.keychain
      #     codesign --sign "Developer ID Application: VectorHawk Inc" --options runtime dist/skillrunner

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skillrunner-${{ matrix.target }}
          path: |
            dist/skillrunner-${{ matrix.target }}.tar.gz
            dist/skillrunner-${{ matrix.target }}.tar.gz.sha256

  build-linux:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Set linker for aarch64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p skillrunner-cli

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/skillrunner dist/skillrunner
          cd dist
          tar czf skillrunner-${{ matrix.target }}.tar.gz skillrunner
          sha256sum skillrunner-${{ matrix.target }}.tar.gz > skillrunner-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skillrunner-${{ matrix.target }}
          path: |
            dist/skillrunner-${{ matrix.target }}.tar.gz
            dist/skillrunner-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/skillrunner-aarch64-apple-darwin/*
            artifacts/skillrunner-x86_64-apple-darwin/*
            artifacts/skillrunner-x86_64-unknown-linux-gnu/*
            artifacts/skillrunner-aarch64-unknown-linux-gnu/*

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: vectorhawk/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARM64_SHA=$(cat artifacts/skillrunner-aarch64-apple-darwin/skillrunner-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          X86_SHA=$(cat artifacts/skillrunner-x86_64-apple-darwin/skillrunner-x86_64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          LINUX_X86_SHA=$(cat artifacts/skillrunner-x86_64-unknown-linux-gnu/skillrunner-x86_64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')
          LINUX_ARM64_SHA=$(cat artifacts/skillrunner-aarch64-unknown-linux-gnu/skillrunner-aarch64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')

          cat > homebrew-tap/Formula/skillrunner.rb << FORMULA
          class Skillrunner < Formula
            desc "Local AI skill runtime and MCP aggregator"
            homepage "https://github.com/vectorhawk/skillrunner"
            license "Apache-2.0"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/vectorhawk/skillrunner/releases/download/v${VERSION}/skillrunner-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM64_SHA}"
              else
                url "https://github.com/vectorhawk/skillrunner/releases/download/v${VERSION}/skillrunner-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/vectorhawk/skillrunner/releases/download/v${VERSION}/skillrunner-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              else
                url "https://github.com/vectorhawk/skillrunner/releases/download/v${VERSION}/skillrunner-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X86_SHA}"
              end
            end

            def install
              bin.install "skillrunner"
            end

            def post_install
              system bin/"skillrunner", "mcp", "setup"
            end

            def caveats
              <<~EOS
                SkillRunner has been configured as an MCP server for your AI clients.
                Restart Claude Code, Cursor, or other AI clients to pick up the changes.
              EOS
            end

            test do
              assert_match "skillrunner", shell_output("#{bin}/skillrunner --version")
            end
          end
          FORMULA

      - name: Commit and push formula
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${GITHUB_REF_NAME#v}"
          git add Formula/skillrunner.rb
          git commit -m "Update skillrunner to ${VERSION}"
          git push
